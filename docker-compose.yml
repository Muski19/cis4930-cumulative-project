services:
  flask-app:
    build: .
    container_name: cis4930-flask-app
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    container_name: cis4930-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app